<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cartoon Characters!</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --sky: #ffeb3b;
      --pop: #ff4f81;
      --blue: #00bcd4;
      --green: #69f0ae;
      --dark: #1a1a2e;
      --card: #fff8f0;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: var(--dark);
      font-family: 'Nunito', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      overflow-x: hidden;
      padding: 40px 20px 60px;
    }

    /* Stars background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(circle, #fff 1px, transparent 1px),
        radial-gradient(circle, #fff8 1px, transparent 1px);
      background-size: 80px 80px, 40px 40px;
      background-position: 0 0, 20px 20px;
      opacity: 0.06;
      pointer-events: none;
      z-index: 0;
    }

    h1 {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(2.2rem, 6vw, 4rem);
      color: var(--sky);
      text-align: center;
      letter-spacing: 2px;
      margin-bottom: 8px;
      text-shadow: 4px 4px 0 var(--pop), 8px 8px 0 #ff4f8133;
      position: relative;
      z-index: 1;
    }

    .subtitle {
      color: #aaa;
      font-size: 1rem;
      margin-bottom: 36px;
      text-align: center;
      letter-spacing: 1px;
      position: relative;
      z-index: 1;
    }

    /* Dropdown */
    .dropdown-wrapper {
      position: relative;
      width: min(420px, 90vw);
      z-index: 10;
    }

    .dropdown-btn {
      width: 100%;
      padding: 18px 24px;
      background: var(--pop);
      color: #fff;
      font-family: 'Fredoka One', cursive;
      font-size: 1.3rem;
      border: none;
      border-radius: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 6px 0 #b5004f, 0 10px 30px #ff4f8155;
      transition: transform 0.1s, box-shadow 0.1s;
      letter-spacing: 1px;
    }

    .dropdown-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 0 #b5004f, 0 14px 30px #ff4f8155; }
    .dropdown-btn:active { transform: translateY(2px); box-shadow: 0 3px 0 #b5004f; }

    .arrow {
      display: inline-block;
      transition: transform 0.3s cubic-bezier(.4,2,.6,1);
      font-size: 1rem;
    }
    .open .arrow { transform: rotate(180deg); }

    .dropdown-list {
      position: absolute;
      top: calc(100% + 10px);
      left: 0; right: 0;
      background: #fff;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 20px 60px #0008;
      max-height: 0;
      opacity: 0;
      transform: scaleY(0.85) translateY(-10px);
      transform-origin: top;
      transition: max-height 0.4s cubic-bezier(.4,2,.6,1), opacity 0.3s, transform 0.3s cubic-bezier(.4,2,.6,1);
    }

    .dropdown-list.show {
      max-height: 460px;
      opacity: 1;
      transform: scaleY(1) translateY(0);
      overflow-y: auto;
    }

    .dropdown-list::-webkit-scrollbar { width: 6px; }
    .dropdown-list::-webkit-scrollbar-thumb { background: #ffd; border-radius: 10px; }

    .character-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 20px;
      cursor: pointer;
      transition: background 0.15s;
      border-bottom: 1px solid #f0e8e8;
      font-family: 'Nunito', sans-serif;
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--dark);
    }

    .character-item:last-child { border-bottom: none; }
    .character-item:hover { background: #fff3f8; }

    .char-emoji { font-size: 1.6rem; }

    /* Display Card */
    .display-area {
      margin-top: 36px;
      width: min(480px, 90vw);
      position: relative;
      z-index: 1;
    }

    .char-card {
      background: var(--card);
      border-radius: 28px;
      padding: 32px 28px 28px;
      box-shadow: 0 12px 0 #c8a06044, 0 20px 60px #0007;
      display: none;
      flex-direction: column;
      align-items: center;
      animation: popIn 0.45s cubic-bezier(.4,2,.6,1);
      border: 3px solid #ffddb3;
      position: relative;
      overflow: hidden;
    }

    .char-card.visible { display: flex; }

    .char-card::before {
      content: '';
      position: absolute;
      top: -40px; right: -40px;
      width: 120px; height: 120px;
      border-radius: 50%;
      background: var(--pop);
      opacity: 0.08;
    }

    @keyframes popIn {
      0% { opacity: 0; transform: scale(0.7) rotate(-4deg); }
      70% { transform: scale(1.05) rotate(1deg); }
      100% { opacity: 1; transform: scale(1) rotate(0deg); }
    }

    .char-card h2 {
      font-family: 'Fredoka One', cursive;
      font-size: 2rem;
      color: var(--dark);
      margin-bottom: 6px;
      text-align: center;
      letter-spacing: 1px;
    }

    .char-card .char-show {
      color: var(--pop);
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    .img-frame {
      width: 260px;
      height: 260px;
      border-radius: 50%;
      overflow: hidden;
      border: 5px solid var(--pop);
      box-shadow: 0 0 0 6px #ffd1e3, 0 8px 30px #ff4f8133;
      background: #ffd1e3;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
      position: relative;
    }

    .img-frame img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.4s cubic-bezier(.4,2,.6,1);
    }

    .char-card.visible .img-frame img { transform: scale(1); }

    .img-fallback {
      font-size: 6rem;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
    }

    .char-desc {
      text-align: center;
      color: #666;
      font-size: 0.95rem;
      line-height: 1.6;
      max-width: 340px;
    }

    .tag {
      display: inline-block;
      margin-top: 14px;
      padding: 5px 16px;
      border-radius: 40px;
      background: var(--blue);
      color: #fff;
      font-size: 0.8rem;
      font-weight: 900;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .placeholder {
      text-align: center;
      color: #555;
      font-size: 1rem;
      padding: 30px;
      font-style: italic;
    }

    .placeholder span { font-size: 3rem; display: block; margin-bottom: 10px; }
  </style>
</head>
<body>

  <h1>🎬 Cartoon World!</h1>
  <p class="subtitle">Pick your favorite character below ↓</p>

  <div class="dropdown-wrapper">
    <button class="dropdown-btn" id="dropBtn" onclick="toggleDropdown()">
      <span id="btnLabel">Choose a Character...</span>
      <span class="arrow">▼</span>
    </button>
    <div class="dropdown-list" id="dropList"></div>
  </div>

  <div class="display-area">
    <div class="char-card" id="charCard">
      <div class="char-card-inner">
        <h2 id="charName"></h2>
        <div class="char-show" id="charShow"></div>
        <div class="img-frame">
          <img id="charImg" src="" alt="" onerror="this.style.display='none'; document.getElementById('charEmojiFallback').style.display='flex';" />
          <div class="img-fallback" id="charEmojiFallback" style="display:none;"></div>
        </div>
        <p class="char-desc" id="charDesc"></p>
        <span class="tag" id="charTag"></span>
      </div>
    </div>
    <div class="placeholder" id="placeholder">
      <span>🍿</span>
      Select a character to see them appear!
    </div>
  </div>

  <script>
    const characters = [
      {
        name: "SpongeBob SquarePants",
        show: "SpongeBob SquarePants",
        emoji: "🧽",
        img: "https://upload.wikimedia.org/wikipedia/en/thumb/3/3b/SpongeBob_SquarePants_character.svg/640px-SpongeBob_SquarePants_character.svg.png",
        desc: "An enthusiastic sea sponge who lives in a pineapple under the sea and works as a fry cook at the Krusty Krab.",
        tag: "Nickelodeon"
      },
      {
        name: "Tom Cat",
        show: "Tom and Jerry",
        emoji: "🐱",
        img: "https://upload.wikimedia.org/wikipedia/en/thumb/4/4a/Tom_Tom_and_Jerry.png/220px-Tom_Tom_and_Jerry.png",
        desc: "A domestic cat forever chasing the clever little mouse Jerry in one of the greatest rivalries in cartoon history.",
        tag: "MGM / WB"
      },
      {
        name: "Bugs Bunny",
        show: "Looney Tunes",
        emoji: "🐰",
        img: "https://upload.wikimedia.org/wikipedia/en/thumb/a/a6/Bugs_Bunny.svg/640px-Bugs_Bunny.svg.png",
        desc: "The witty, carrot-munching rabbit who always outsmarts hunters with his famous line, 'What's up, Doc?'",
        tag: "Warner Bros."
      },
      {
        name: "Pikachu",
        show: "Pokémon",
        emoji: "⚡",
        img: "https://upload.wikimedia.org/wikipedia/en/a/a6/Pok%C3%A9mon_Pikachu_art.png",
        desc: "The beloved Electric-type Pokémon and Ash's loyal partner — the most iconic creature in the Pokémon universe.",
        tag: "Nintendo / OLM"
      },
      {
        name: "Scooby-Doo",
        show: "Scooby-Doo",
        emoji: "🐶",
        img: "https://upload.wikimedia.org/wikipedia/en/thumb/5/53/Scooby-Doo.png/220px-Scooby-Doo.png",
        desc: "A lovable Great Dane who solves mysteries with his gang — except he's usually more scared than the monsters!",
        tag: "Hanna-Barbera"
      },
      {
        name: "Homer Simpson",
        show: "The Simpsons",
        emoji: "🍩",
        img: "https://upload.wikimedia.org/wikipedia/en/thumb/0/0b/Homer_Simpson_2006.png/220px-Homer_Simpson_2006.png",
        desc: "Springfield's lovable, donut-obsessed, safety-inspector dad with his legendary catchphrase 'D'oh!'",
        tag: "Fox / Disney"
      },
      {
        name: "Mickey Mouse",
        show: "Mickey Mouse",
        emoji: "🐭",
        img: "https://upload.wikimedia.org/wikipedia/en/thumb/d/d4/Mickey_Mouse.png/250px-Mickey_Mouse.png",
        desc: "Walt Disney's iconic mascot and the cheerful, red-shorted mouse who started it all back in 1928.",
        tag: "Disney"
      },
      {
        name: "Naruto Uzumaki",
        show: "Naruto",
        emoji: "🍜",
        img: "https://upload.wikimedia.org/wikipedia/en/9/9a/NarutoUzumaki.png",
        desc: "A young ninja with a dream to become Hokage — determined, loud, and hiding a powerful fox spirit within him.",
        tag: "Shonen Jump"
      },
      {
        name: "Goku",
        show: "Dragon Ball Z",
        emoji: "💥",
        img: "https://upload.wikimedia.org/wikipedia/en/a/a7/Goku_Dragon_Ball_FighterZ.png",
        desc: "A Saiyan warrior raised on Earth, always pushing his limits in epic battles to protect the universe.",
        tag: "Toei Animation"
      },
      {
        name: "Finn the Human",
        show: "Adventure Time",
        emoji: "🗡️",
        img: "https://upload.wikimedia.org/wikipedia/en/thumb/4/4b/FinnThehuman.png/220px-FinnThehuman.png",
        desc: "The last human in the Land of Ooo, brave and heroic, always ready for adventure with his magical dog Jake.",
        tag: "Cartoon Network"
      }
    ];

    let isOpen = false;
    let selected = null;

    const dropBtn = document.getElementById('dropBtn');
    const dropList = document.getElementById('dropList');
    const btnLabel = document.getElementById('btnLabel');
    const charCard = document.getElementById('charCard');
    const placeholder = document.getElementById('placeholder');

    // Build list
    characters.forEach((c, i) => {
      const item = document.createElement('div');
      item.className = 'character-item';
      item.innerHTML = `<span class="char-emoji">${c.emoji}</span> ${c.name}`;
      item.addEventListener('click', () => selectCharacter(i));
      dropList.appendChild(item);
    });

    function toggleDropdown() {
      isOpen = !isOpen;
      dropBtn.classList.toggle('open', isOpen);
      dropList.classList.toggle('show', isOpen);
    }

    function selectCharacter(i) {
      selected = characters[i];
      btnLabel.textContent = selected.emoji + ' ' + selected.name;
      isOpen = false;
      dropBtn.classList.remove('open');
      dropList.classList.remove('show');
      showCharacter(selected);
    }

    function showCharacter(c) {
      document.getElementById('charName').textContent = c.name;
      document.getElementById('charShow').textContent = c.show;
      document.getElementById('charDesc').textContent = c.desc;
      document.getElementById('charTag').textContent = c.tag;

      const img = document.getElementById('charImg');
      const fallback = document.getElementById('charEmojiFallback');
      img.style.display = 'block';
      fallback.style.display = 'none';
      fallback.textContent = c.emoji;
      img.src = c.img;
      img.alt = c.name;

      charCard.classList.remove('visible');
      placeholder.style.display = 'none';
      void charCard.offsetWidth; // force reflow for animation
      charCard.classList.add('visible');
    }

    // Close on outside click
    document.addEventListener('click', (e) => {
      if (!document.querySelector('.dropdown-wrapper').contains(e.target) && isOpen) {
        isOpen = false;
        dropBtn.classList.remove('open');
        dropList.classList.remove('show');
      }
    });
  </script>
</body>
</html>
